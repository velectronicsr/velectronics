<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Electronics - Platform Update</title>
    <style>
        :root {
            /* V Electronics Brand Colors */
            --brand-blue: #004b87;
            --brand-light: #e6f0fa;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Smooth, slow-moving gradient background */
        body {
            background: linear-gradient(-45deg, #f8fafc, #ffffff, #e2e8f0, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ultra-clean floating card */
        .maintenance-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: clamp(40px, 8vw, 60px) clamp(30px, 6vw, 50px);
            box-shadow: 0 20px 40px rgba(0, 75, 135, 0.06), 
                        inset 0 0 0 1px rgba(255, 255, 255, 1);
            text-align: center;
            max-width: 520px;
            width: 100%;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Logo with Blend Mode to hide the JPG background */
        .logo {
            width: clamp(140px, 25vw, 180px);
            margin: 0 auto 30px;
            display: block;
            mix-blend-mode: multiply; /* This is the magic fix for your JPG */
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Typography */
        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--brand-blue);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: clamp(0.95rem, 3vw, 1.05rem);
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 45px;
        }

        /* Sleek Installation Loader */
        .loader-wrapper {
            width: 100%;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: var(--brand-light);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-blue);
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 20px;
        }

        /* Fading animation for text changes */
        .fade-text {
            animation: textFade 0.4s ease-in-out;
        }

        @keyframes textFade {
            0% { opacity: 0; transform: translateY(3px); }
            100% { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <main class="maintenance-card">
        
        <img src="logo.jpg" alt="V Electronics" class="logo">

        <h1>Platform Optimization</h1>
        <p>We're upgrading our core infrastructure to bring you a faster, more robust experience. Systems will be back online shortly.</p>

        <div class="loader-wrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="status-text" id="status-message">Initializing sequence...</div>
        </div>

    </main>

    <script>
        const statusMessages = [
            "Initializing update sequence...",
            "Synchronizing hardware inventory...",
            "Calibrating 3D printing modules...",
            "Securing user session data...",
            "Optimizing frontend rendering...",
            "Finalizing platform deployment..."
        ];

        const progressFill = document.getElementById('progress-fill');
        const statusMessageEl = document.getElementById('status-message');
        
        let currentStep = 0;
        const totalSteps = statusMessages.length;

        function updateLoader() {
            if (currentStep < totalSteps) {
                // Update Progress Bar Width
                const percentage = ((currentStep + 1) / totalSteps) * 100;
                progressFill.style.width = `${percentage}%`;

                // Re-trigger CSS animation for text
                statusMessageEl.classList.remove('fade-text');
                void statusMessageEl.offsetWidth; 
                
                statusMessageEl.textContent = statusMessages[currentStep];
                statusMessageEl.classList.add('fade-text');

                currentStep++;
                
                // Randomize delay to look like real system processing (1.5s to 3s)
                const nextDelay = Math.random() * 1500 + 1500;
                setTimeout(updateLoader, nextDelay);
            } else {
                statusMessageEl.textContent = "Systems ready. Standing by...";
                progressFill.style.background = "#10b981"; // Turns green on completion
            }
        }

        // Start animation shortly after load
        setTimeout(updateLoader, 800);
    </script>
</body>
</html>
